<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akvaryum Dozaj Kontrolü</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f2f5;
            color: #333; margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .app-container { width: 100%; max-width: 500px; }
        .card {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        h2 { text-align: center; color: #0056b3; margin-top: 0; }
        label { font-weight: bold; font-size: 13px; color: #555; display: block; margin-top: 10px; }
        input {
            width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd;
            border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-blue { background-color: #0056b3; color: white; margin-top: 15px; }
        .btn-blue:hover { background-color: #004494; }
        .btn-green { background-color: #28a745; color: white; margin-top: 10px; }
        .btn-green:hover { background-color: #218838; }
        .btn-red { background-color: #dc3545; color: white; margin-top: 20px; }
        
        #status-bar { text-align: center; font-weight: bold; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
        .offline { background-color: #f8d7da; color: #721c24; }
        .online { background-color: #d4edda; color: #155724; }

        /* Pompa Grid Tasarımı */
        .pump-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .pump-box { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 8px; text-align: center; }
        .pump-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #333; }
        .pump-box input { text-align: center; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="setup-screen" class="card" style="display: none;">
        <h2>Cihaz Kurulumu</h2>
        <p style="font-size: 13px; color: #666; text-align:center;">ESP32'nize bağlanıp Wi-Fi ve MQTT ayarlarını gönderin.</p>
        
        <label>Ev Wi-Fi Adı (SSID)</label>
        <input type="text" id="ssid" placeholder="Örn: Ev_Net">
        <label>Ev Wi-Fi Şifresi</label>
        <input type="password" id="pass">
        <label>HiveMQ / Broker Adresi</label>
        <input type="text" id="mq_ip" placeholder="xyz.s1.eu.hivemq.cloud">
        <label>MQTT Kullanıcı Adı</label>
        <input type="text" id="mq_u">
        <label>MQTT Şifresi</label>
        <input type="password" id="mq_p">

        <button class="btn-blue" id="connectBtn">Bluetooth ile Cihaza Gönder</button>
        <div id="ble-status" style="text-align: center; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div id="dashboard-screen" style="display: none;">
        <div id="status-bar" class="offline">MQTT Bağlantısı Bekleniyor...</div>
        
        <div class="card">
            <h2>Akvaryum Dozaj Pompaları</h2>
            <div id="pumps-container" class="pump-grid">
                </div>
            
            <button class="btn-red" onclick="resetApp()">Sistemi Sıfırla (Kuruluma Dön)</button>
        </div>
    </div>

</div>

<script>
    // --- BLE AYARLARI ---
    const serviceUuid = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const characteristicUuid = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    // --- EKRAN KONTROLLERİ ---
    const setupScreen = document.getElementById('setup-screen');
    const dashboardScreen = document.getElementById('dashboard-screen');
    const statusBar = document.getElementById('status-bar');
    let mqttClient = null;

    // Sayfa açıldığında hafızayı kontrol et
    window.onload = () => {
        const savedConfig = localStorage.getItem('dozaj_config');
        if (savedConfig) {
            // Kayıtlı ayar varsa direkt kontrol panelini aç ve MQTT'ye bağlan
            setupScreen.style.display = 'none';
            dashboardScreen.style.display = 'block';
            buildPumpUI();
            connectMQTT(JSON.parse(savedConfig));
        } else {
            // Kayıt yoksa kurulum ekranını aç
            setupScreen.style.display = 'block';
            dashboardScreen.style.display = 'none';
        }
    };

    // --- DİNAMİK POMPA ARAYÜZÜ OLUŞTURMA ---
    function buildPumpUI() {
        const container = document.getElementById('pumps-container');
        container.innerHTML = '';
        
        for (let i = 1; i <= 6; i++) {
            container.innerHTML += `
                <div class="pump-box">
                    <h3>Pompa ${i}</h3>
                    <label>Kalibrasyon (1ml=sn)</label>
                    <input type="number" id="cal_${i}" value="10" step="0.1">
                    <label>Dozaj (ml)</label>
                    <input type="number" id="dose_${i}" value="2" step="0.5">
                    <button class="btn-green" onclick="triggerPump(${i})">Çalıştır</button>
                </div>
            `;
        }
    }

    // --- BLUETOOTH KURULUM İŞLEMİ ---
    document.getElementById('connectBtn').addEventListener('click', async () => {
        const ssid = document.getElementById('ssid').value;
        const pass = document.getElementById('pass').value;
        const mq_ip = document.getElementById('mq_ip').value;
        const mq_u = document.getElementById('mq_u').value;
        const mq_p = document.getElementById('mq_p').value;
        const bleStatus = document.getElementById('ble-status');

        if (!ssid || !mq_ip) { alert("Wi-Fi adı ve Broker adresi zorunludur!"); return; }

        const payloadObj = { ssid, pass, mq_ip, mq_u, mq_p };
        
        try {
            bleStatus.innerText = "Cihaz aranıyor...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: "Akvaryum_Dozaj" }],
                optionalServices: [serviceUuid]
            });

            bleStatus.innerText = "Bağlanılıyor...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(serviceUuid);
            const characteristic = await service.getCharacteristic(characteristicUuid);

            const encoder = new TextEncoder('utf-8');
            await characteristic.writeValue(encoder.encode(JSON.stringify(payloadObj)));

            bleStatus.style.color = "green";
            bleStatus.innerText = "Başarılı! Cihaz yeniden başlıyor.";
            device.gatt.disconnect();

            // Ayarları tarayıcı hafızasına kaydet ve paneli aç
            localStorage.setItem('dozaj_config', JSON.stringify(payloadObj));
            
            setTimeout(() => {
                setupScreen.style.display = 'none';
                dashboardScreen.style.display = 'block';
                buildPumpUI();
                connectMQTT(payloadObj);
            }, 2000);

        } catch (error) {
            bleStatus.style.color = "red";
            bleStatus.innerText = "Hata: " + error.message;
        }
    });

    // --- MQTT BAĞLANTISI VE HABERLEŞME ---
    function connectMQTT(config) {
        // WebView (Tarayıcı) WSS (Secure WebSockets) kullanmak zorundadır! Port: 8884
        const brokerUrl = `wss://${config.mq_ip}:8884/mqtt`;
        
        const options = {
            clientId: 'WebUygulamasi_' + Math.random().toString(16).substr(2, 8),
            username: config.mq_u,
            password: config.mq_p,
            clean: true
        };

        statusBar.innerText = "Buluta (HiveMQ) Bağlanılıyor...";
        statusBar.className = "offline";

        mqttClient = mqtt.connect(brokerUrl, options);

        mqttClient.on('connect', () => {
            statusBar.innerText = "Sistem Çevrimiçi - Bağlantı Başarılı";
            statusBar.className = "online";
        });

        mqttClient.on('error', (err) => {
            statusBar.innerText = "Bağlantı Hatası! Bilgileri kontrol edin.";
            statusBar.className = "offline";
            console.error(err);
        });
    }

    // --- MOTORU TETİKLEME (HESAPLAMA) ---
    function triggerPump(pumpId) {
        if (!mqttClient || !mqttClient.connected) {
            alert("Lütfen sistemin çevrimiçi olmasını bekleyin!");
            return;
        }

        const cal = parseFloat(document.getElementById(`cal_${pumpId}`).value);
        const dose = parseFloat(document.getElementById(`dose_${pumpId}`).value);
        
        // Matematik: (1 ml için saniye) * (Dozaj miktarı) * 1000 = Milisaniye
        const ms = Math.round(cal * dose * 1000);

        // ESP32'deki koda uygun başlığa (topic) süreyi gönder
        const topic = `dozaj/pompa/${pumpId}`;
        mqttClient.publish(topic, ms.toString());
        
        console.log(`Gönderilen: Başlık=${topic}, Süre=${ms}ms`);
    }

    // --- SİSTEMİ SIFIRLAMA ---
    function resetApp() {
        if(confirm("Tüm ayarları silip kurulum ekranına dönmek istediğinize emin misiniz?")) {
            localStorage.removeItem('dozaj_config');
            location.reload();
        }
    }
</script>

</body>
</html>
