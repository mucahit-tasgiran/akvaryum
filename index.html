<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akvaryum Dozaj Kontrolü</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f2f5;
            color: #333; margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .app-container { width: 100%; max-width: 500px; }
        .card {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        h2 { text-align: center; color: #0056b3; margin-top: 0; }
        label { font-weight: bold; font-size: 13px; color: #555; display: block; margin-top: 10px; }
        input {
            width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd;
            border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-blue { background-color: #0056b3; color: white; margin-top: 15px; }
        .btn-blue:hover { background-color: #004494; }
        .btn-green { background-color: #28a745; color: white; margin-top: 10px; }
        .btn-green:hover { background-color: #218838; }
        .btn-red { background-color: #dc3545; color: white; margin-top: 20px; }
        .btn-outline { background-color: transparent; color: #0056b3; border: 2px solid #0056b3; margin-top: 10px; }
        .btn-outline:hover { background-color: #e6f0fa; }
        
        #status-bar { text-align: center; font-weight: bold; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
        .offline { background-color: #f8d7da; color: #721c24; }
        .online { background-color: #d4edda; color: #155724; }

        /* Pompa Grid Tasarımı */
        .pump-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .pump-box { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 8px; text-align: center; }
        .pump-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #333; }
        .pump-box input { text-align: center; }
    </style>
</head>
